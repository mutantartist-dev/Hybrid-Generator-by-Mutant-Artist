<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;min-height:100vh;transition:background 0.3s}
button{font-family:inherit;cursor:pointer}
input[type=checkbox]{accent-color:#7c3aed}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#3a3a5a;border-radius:4px}

/* Spin animation */
@keyframes spinFlash{0%,100%{opacity:1}50%{opacity:0.5}}
.spinning{animation:spinFlash 0.1s ease-in-out infinite}

/* Prompt text selectable */
.prompt-text{user-select:text;cursor:text}

/* Card hover */
.slot-card{transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s}
.slot-card:hover{transform:translateY(-1px)}

/* Filled card top bar */
.card-bar{position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0}

/* Buttons */
.btn-spin{transition:all 0.15s;letter-spacing:0.06em}
.btn-spin:hover:not(:disabled){background:rgba(124,58,237,0.12)!important;border-color:#7c3aed!important;color:#7c3aed!important}
.btn-lock{transition:all 0.15s}
.btn-main{transition:opacity 0.15s}
.btn-main:hover{opacity:0.88}
.btn-copy{transition:all 0.2s}

/* Settings overlay */
.settings-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center}
.settings-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px)}
.settings-card{position:relative;border-radius:16px;width:500px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,0.35)}

/* Cat toggle */
.cat-btn{transition:all 0.15s;border-radius:8px;border:1px solid;padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;background:transparent}
.cat-btn:hover{filter:brightness(1.08)}

/* Lang/theme pill */
.pill-btn{border:none;padding:5px 11px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s;letter-spacing:0.05em}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:8px;font-size:12px;font-weight:500;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:200}

#root {

  padding: 10px 24px;
}

/* 1K+ */
@media (min-width: 1200px) {
  #root {
    max-width: 980px;
  }
}

/* 2K+ */
@media (min-width: 2000px) {
  body {
    font-size: 1.08em;
  }

  #root {
    transform: scale(1.08);
    transform-origin: top center;
  }
}
</style>

// ─── State ────────────────────────────────────────────────────────────────

function loadSettings() {
  try { return JSON.parse(localStorage.getItem("hg_settings")||"{}"); } catch { return {}; }
}
function saveSettings() {
  localStorage.setItem("hg_settings", JSON.stringify({
    theme:state.theme, lang:state.lang, disabledCats:state.disabledCats
  }));
}

const saved = loadSettings();
const state = {
  theme: saved.theme || "Dark",
  lang: saved.lang || "en",
  disabledCats: saved.disabledCats || [],
  selections: {}, // slot -> {name, desc, category}
  locked: {},     // slot -> bool
  spinning: {},   // slot -> bool
  spinDisplay: {},// slot -> string
  showSettings: false,
};

// ─── Filtering ────────────────────────────────────────────────────────────

function getActiveAnimals() {
  const dc = state.disabledCats;
  if (!dc.length) return ALL_ANIMALS;
  const disabled = new Set(dc);
  const enabled = new Set(ALL_CATEGORIES.filter(c => !disabled.has(c)));
  return ALL_ANIMALS.filter(a => {
    const cats = a.categories;
    const matchEnabled = cats.filter(c => enabled.has(c));
    const matchDisabled = cats.filter(c => disabled.has(c));
    if (!matchEnabled.length) return false;
    const purelyEnabled = matchEnabled.filter(c => !disabled.has(c));
    if (matchDisabled.length && !purelyEnabled.length) return false;
    return true;
  });
}

function getPool(animals, slot) {
  if (slot === "extra") return EXTRA_MODIFIERS;
  return animals.filter(a => a.slots_allowed[slot]);
}

function animalName(a) {
  const n = a.name;
  if (typeof n === "string") return n;
  return n[state.lang] || n.en || a.id;
}

function extraName(e) { return state.lang === "ru" ? e.ru : e.en; }

function pickRandom(pool, slot) {
  if (!pool.length) return null;
  const e = pool[Math.floor(Math.random()*pool.length)];
  if (slot === "extra") {
    return {name: extraName(e), desc: e.desc, category: null};
  }
  return {
    name: animalName(e),
    desc: e.descriptions[slot] || animalName(e),
    category: e.categories[0] || null
  };
}

function buildPrompt() {
  const parts = SLOTS.map(s => state.selections[s]?.desc).filter(Boolean);
  if (!parts.length) return "";
  if (parts.length === 1) return `A hybrid creature with ${parts[0]}. Fantasy concept art, ultra detailed, dramatic lighting.`;
  return `A hybrid creature with ${parts.slice(0,-1).join(", ")}, and ${parts[parts.length-1]}. Fantasy concept art, ultra detailed, dramatic lighting.`;
}

// ─── DOM helpers ──────────────────────────────────────────────────────────

const $ = id => document.getElementById(id);
const mk = (tag, attrs={}, ...children) => {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    el.append(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return el;
};

function showToast(msg, color) {
  const toast = $("toast");
  const t = THEMES[state.theme];
  toast.textContent = msg;
  toast.style.background = color || t.surface;
  toast.style.color = t.text;
  toast.style.border = `1px solid ${t.border}`;
  toast.style.opacity = "1";
  clearTimeout(toast._to);
  toast._to = setTimeout(() => toast.style.opacity = "0", 2000);
}

// ─── Spin ─────────────────────────────────────────────────────────────────

function spinSlot(slot) {
  if (state.locked[slot] || state.spinning[slot]) return;
  const animals = getActiveAnimals();
  const pool = getPool(animals, slot);
  if (!pool.length) {
    showToast(state.lang==="ru"?"⚠ Нет животных для этого слота":"⚠ No animals for this slot");
    return;
  }
  const names = slot === "extra" ? pool.map(extraName) : pool.map(animalName);
  const result = pickRandom(pool, slot);
  state.spinning[slot] = true;
  updateCard(slot);

  let frame = 0;
  const iv = setInterval(() => {
    state.spinDisplay[slot] = names[Math.floor(Math.random()*names.length)];
    updateCardValue(slot);
    frame++;
    if (frame >= 9) {
      clearInterval(iv);
      state.spinning[slot] = false;
      state.spinDisplay[slot] = null;
      if (result) state.selections[slot] = result;
      updateCard(slot);
      updatePrompt();
    }
  }, 45);
}

function generateAll() {
  SLOTS.forEach((slot, i) => {
    if (!state.locked[slot]) setTimeout(() => spinSlot(slot), i * 60);
  });
}

function clearAll() {
  state.selections = {};
  state.locked = {};
  state.spinning = {};
  state.spinDisplay = {};
  SLOTS.forEach(s => updateCard(s));
  updatePrompt();
  showToast(state.lang==="ru"?"Очищено":"Cleared");
}

// ─── Render: Card ─────────────────────────────────────────────────────────

function updateCardValue(slot) {
  const el = $("val-"+slot);
  if (!el) return;
  const t = THEMES[state.theme];
  if (state.spinning[slot]) {
    el.textContent = state.spinDisplay[slot] || "…";
    el.className = "spinning";
    el.style.color = t.accent;
    el.style.fontWeight = "500";
  } else if (state.selections[slot]) {
    el.textContent = state.selections[slot].name;
    el.className = "prompt-text";
    el.style.color = t.text;
    el.style.fontWeight = "500";
  } else {
    el.textContent = state.lang==="ru"?"Не выбрано":"Not generated";
    el.className = "";
    el.style.color = t.textMuted;
    el.style.fontWeight = "400";
    el.style.fontStyle = "italic";
  }
}

function updateCard(slot) {
  const card = $("card-"+slot);
  if (!card) return;
  const t = THEMES[state.theme];
  const filled = !!state.selections[slot];
  const lk = !!state.locked[slot];

  card.style.border = `1px solid ${filled ? t.accent+"55" : t.border}`;
  card.style.background = t.surface;

  const bar = $("bar-"+slot);
  if (bar) bar.style.background = filled ? t.accent : "transparent";

  const tag = $("tag-"+slot);
  if (tag) {
    const cat = state.selections[slot]?.category;
    if (cat && filled) {
      tag.textContent = CAT_LABELS[state.lang][cat] || cat;
      tag.style.background = t.tag;
      tag.style.color = t.tagText;
      tag.style.opacity = "1";
    } else {
      tag.textContent = "";
      tag.style.opacity = "0";
    }
  }

  const lockBtn = $("lock-"+slot);
  if (lockBtn) {
    lockBtn.textContent = lk ? "🔒" : "🔓";
    lockBtn.style.borderColor = lk ? t.accent : t.border;
    lockBtn.style.background = lk ? t.accentLight : "transparent";
    lockBtn.style.color = lk ? t.accentText : t.textMuted;
  }

  const spinBtn = $("spin-"+slot);
  if (spinBtn) {
    spinBtn.disabled = lk || state.spinning[slot];
    spinBtn.style.opacity = (lk || state.spinning[slot]) ? "0.4" : "1";
    spinBtn.style.cursor = (lk || state.spinning[slot]) ? "not-allowed" : "pointer";
  }

  const label = $("slotlabel-"+slot);
  if (label) {
    label.textContent = SLOT_LABELS[state.lang][slot];
    label.style.color = t.textMuted;
  }

  updateCardValue(slot);
}

function renderCard(slot) {
  const t = THEMES[state.theme];
  const card = mk("div", {
    id:"card-"+slot,
    class:"slot-card",
    style:{
      background:t.surface, border:`1px solid ${t.border}`, borderRadius:"12px",
      padding:"16px 18px", display:"flex", flexDirection:"column", gap:"10px",
      position:"relative", overflow:"hidden"
    }
  });

  // Top accent bar
  const bar = mk("div",{id:"bar-"+slot,class:"card-bar",style:{background:"transparent"}});
  card.append(bar);

  // Header row
  const hdr = mk("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}});

  const iconLabel = mk("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
  iconLabel.append(mk("span",{style:{fontSize:"14px"}}, SLOT_ICONS[slot]));
  const lbl = mk("span",{id:"slotlabel-"+slot,style:{fontSize:"16px",fontWeight:"600",
    color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.09em"}},
    SLOT_LABELS[state.lang][slot]);
  iconLabel.append(lbl);
  hdr.append(iconLabel);

  const lockBtn = mk("button",{
    id:"lock-"+slot, class:"btn-lock",
    style:{width:"22px",height:"22px",borderRadius:"5px",
      border:`1px solid ${t.border}`,background:"transparent",
      color:t.textMuted,fontSize:"11px",display:"flex",alignItems:"center",
      justifyContent:"center",flexShrink:"0"},
    onClick:() => { state.locked[slot] = !state.locked[slot]; updateCard(slot); }
  }, "🔓");
  hdr.append(lockBtn);
  card.append(hdr);

  // Value
  const valWrap = mk("div",{style:{minHeight:"42px",display:"flex",alignItems:"center"}});
const val = mk("span",{
  id:"val-"+slot,
  style:{
    fontSize:"16px",
    fontWeight:"400",
    color:t.textMuted,
    fontStyle:"italic",


    display:"block",
    width:"100%",

    // FIX: норм перенос длинных названий
    whiteSpace:"normal",
    overflowWrap:"break-word",
    wordBreak:"break-word",
    lineHeight:"1.2"
  }
}, state.lang==="ru"?"Не выбрано":"Not generated");

valWrap.append(val);
card.append(valWrap);

  // Footer row
  const ftr = mk("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}});

  const tag = mk("span",{id:"tag-"+slot,style:{
    fontSize:"10px",padding:"2px 8px",borderRadius:"4px",
    background:t.tag,color:t.tagText,fontWeight:"500",opacity:"0",transition:"opacity 0.2s"
  }},"");
  ftr.append(tag);

  const spinBtn = mk("button",{
    id:"spin-"+slot, class:"btn-spin",
    style:{height:"26px",padding:"0 12px",borderRadius:"6px",
      border:`1px solid ${t.borderStrong}`,background:"transparent",
      color:t.textSub,fontSize:"11px",fontWeight:"600"},
    onClick:() => spinSlot(slot)
  }, "SPIN");
  ftr.append(spinBtn);
  card.append(ftr);

  return card;
}

// ─── Render: Settings ────────────────────────────────────────────────────

function openSettings() {
  state.showSettings = true;
  renderSettings();
}

function closeSettings() {
  const ov = $("settings-overlay");
  if (ov) ov.remove();
  state.showSettings = false;
}

function renderSettings() {
  let ov = $("settings-overlay");
  if (ov) ov.remove();

  const t = THEMES[state.theme];

  ov = mk("div",{id:"settings-overlay",class:"settings-overlay"});

  // Backdrop
  const bd = mk("div",{class:"settings-backdrop",onClick:closeSettings});
  ov.append(bd);

  // Card
  const card = mk("div",{class:"settings-card",style:{
    background:t.surface,border:`1px solid ${t.border}`
  }});
  ov.append(card);

  // Header
  const hdr = mk("div",{style:{
    padding:"18px 24px 14px",borderBottom:`1px solid ${t.border}`,
    display:"flex",justifyContent:"space-between",alignItems:"center"
  }});
  hdr.append(mk("span",{style:{fontSize:"14px",fontWeight:"600",color:t.text,letterSpacing:"-0.2px"}},
    state.lang==="ru"?"Настройки":"Settings"));
  hdr.append(mk("button",{
    style:{background:"none",border:`1px solid ${t.border}`,borderRadius:"7px",
      width:"26px",height:"26px",color:t.textMuted,fontSize:"16px",
      display:"flex",alignItems:"center",justifyContent:"center"},
    onClick:closeSettings
  },"×"));
  card.append(hdr);

  // Body
  const body = mk("div",{style:{overflowY:"auto",padding:"20px 24px",flex:"1"}});

  // Section label helper
  const secLabel = (text) => mk("div",{style:{
    fontSize:"10px",fontWeight:"600",color:t.textMuted,
    letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"12px"
  }},text);

  // ── Appearance
  body.append(secLabel(state.lang==="ru"?"Внешний вид":"Appearance"));

  // Theme row
  const themeRow = mk("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}});
  themeRow.append(mk("span",{style:{fontSize:"13px",color:t.textSub}},
    state.lang==="ru"?"Тема":"Theme"));
  const themeGroup = mk("div",{style:{display:"flex",gap:"4px",background:t.bg,
    borderRadius:"8px",border:`1px solid ${t.border}`,padding:"2px",overflow:"hidden"}});
  Object.keys(THEMES).forEach(th => {
    const btn = mk("button",{
      class:"pill-btn",
      style:{borderRadius:"6px",background:state.theme===th ? t.accent:"transparent",
        color:state.theme===th ? "#fff":t.textSub},
      onClick:() => { state.theme=th; saveSettings(); renderApp(); renderSettings(); }
    },th);
    themeGroup.append(btn);
  });
  themeRow.append(themeGroup);
  body.append(themeRow);

  // Lang row
  const langRow = mk("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}});
  langRow.append(mk("span",{style:{fontSize:"13px",color:t.textSub}},
    state.lang==="ru"?"Язык":"Language"));
  const langGroup = mk("div",{style:{display:"flex",gap:"4px",background:t.bg,
    borderRadius:"8px",border:`1px solid ${t.border}`,padding:"2px"}});
  ["en","ru"].forEach(l => {
    const btn = mk("button",{
      class:"pill-btn",
      style:{borderRadius:"6px",background:state.lang===l ? t.accent:"transparent",
        color:state.lang===l?"#fff":t.textSub},
      onClick:() => { state.lang=l; saveSettings(); renderApp(); renderSettings(); }
    },l.toUpperCase());
    langGroup.append(btn);
  });
  langRow.append(langGroup);
  body.append(langRow);

  // ── Categories
  body.append(secLabel(state.lang==="ru"?"Категории животных":"Animal Categories"));

  const grid = mk("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px"}});
  ALL_CATEGORIES.forEach(cat => {
    const enabled = !state.disabledCats.includes(cat);
    const btn = mk("button",{
      class:"cat-btn",
      style:{borderColor:enabled ? t.accent:t.border,
        background:enabled ? t.accentLight:"transparent"},
      onClick:() => {
        if (state.disabledCats.includes(cat))
          state.disabledCats = state.disabledCats.filter(c=>c!==cat);
        else
          state.disabledCats = [...state.disabledCats, cat];
        saveSettings();
        renderSettings();
        updateStatus();
      }
    });
    const check = mk("div",{style:{
      width:"14px",height:"14px",borderRadius:"4px",flexShrink:"0",
      border:`1.5px solid ${enabled ? t.accent:t.borderStrong}`,
      background:enabled ? t.accent:"transparent",
      display:"flex",alignItems:"center",justifyContent:"center"
    }});
    if (enabled) check.append(mk("span",{style:{color:"#fff",fontSize:"9px",fontWeight:"700"}},"✓"));
    btn.append(check);
    btn.append(mk("span",{style:{fontSize:"12px",color:enabled?t.accentText:t.textSub,
      fontWeight:enabled?"500":"400"}}, CAT_LABELS[state.lang][cat]));
    grid.append(btn);
  });
  body.append(grid);
  card.append(body);

  // Footer
  const ftr = mk("div",{style:{
    padding:"12px 24px",borderTop:`1px solid ${t.border}`,
    display:"flex",justifyContent:"flex-end",gap:"8px"
  }});
  ftr.append(mk("button",{
    style:{padding:"8px 20px",borderRadius:"8px",border:`1px solid ${t.border}`,
      background:"transparent",color:t.textSub,fontSize:"13px"},
    onClick:closeSettings
  },state.lang==="ru"?"Закрыть":"Close"));
  ftr.append(mk("button",{
    style:{padding:"8px 20px",borderRadius:"8px",border:"none",
      background:t.accent,color:"#fff",fontSize:"13px",fontWeight:"500"},
    onClick:closeSettings
  },state.lang==="ru"?"Сохранить":"Save"));
  card.append(ftr);

  document.body.append(ov);
}

function updateStatus() {
  const activeCount = getActiveAnimals().length;
  const el = $("status-count");
  if (el) {
    const t = THEMES[state.theme];
    el.textContent = `${activeCount} ${state.lang==="ru"?"животных":"animals"}`;
    el.style.color = t.accent;
  }
}

// ─── Full render ──────────────────────────────────────────────────────────

function renderApp() {
  const root = $("root");
  root.innerHTML = "";
  const t = THEMES[state.theme];
  document.body.style.background = t.bg;

  // ── Header
  const header = mk("div",{style:{
    display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"32px"
  }});

  const headLeft = mk("div");
  headLeft.append(mk("h1",{style:{
    fontSize:"28px",fontWeight:"500",color:t.text,letterSpacing:"-0.6px",lineHeight:"1.2",margin:"0"
  }},"Hybrid Generator"));
  const subLine = mk("p",{style:{margin:"4px 0 0",fontSize:"12px",color:t.textMuted,letterSpacing:"0.04em"}});
  subLine.append(document.createTextNode((state.lang==="ru"?"от MUTANT ARTIST · ":"from MUTANT ARTIST · ")));
  const countSpan = mk("span",{id:"status-count",style:{color:t.accent}},
    `${getActiveAnimals().length} ${state.lang==="ru"?"животных":"animals"}`);
  subLine.append(countSpan);
  headLeft.append(subLine);
  header.append(headLeft);

  const headRight = mk("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});

  // Lang switcher
  const langWrap = mk("div",{style:{
    display:"flex",border:`1px solid ${t.border}`,borderRadius:"8px",overflow:"hidden"
  }});
  ["en","ru"].forEach(l => {
    langWrap.append(mk("button",{
      class:"pill-btn",
      style:{background:state.lang===l ? t.accent:"transparent",
        color:state.lang===l?"#fff":t.textMuted},
      onClick:() => { state.lang=l; saveSettings(); renderApp(); }
    },l.toUpperCase()));
  });
 const tgBtn = mk("a", {
  href: "https://t.me/mutant_artist",
  target: "_blank",
  style: {
    display: "inline-flex",
    alignItems: "center",
    gap: "6px",
    padding: "8px 10px",
    borderRadius: "8px",
    textDecoration: "none",
    fontWeight: "600",
    fontSize: "12px",
    background: "#229ED9",
    color: "#fff"
  }
}, "");

tgBtn.innerHTML = `
<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
  <path d="M9.04 15.47l-.39 5.5c.56 0 .8-.24 1.09-.53l2.64-2.53 5.47 4.01c1.01.56 1.73.27 1.99-.94l3.62-16.96h.01c.32-1.49-.54-2.07-1.52-1.7L1.6 9.6c-1.45.56-1.43 1.36-.25 1.72l5.06 1.58L18.8 5.1c.62-.41 1.18-.18.72.23"/>
</svg>
`;
  headRight.append(tgBtn);
  headRight.append (langWrap);

  // Settings btn
  headRight.append(mk("button",{
    style:{height:"32px",padding:"0 14px",borderRadius:"8px",
      border:`1px solid ${t.border}`,background:"transparent",
      color:t.textSub,fontSize:"12px",display:"flex",alignItems:"center",gap:"6px"},
    onClick:openSettings
  },`⚙ ${state.lang==="ru"?"Настройки":"Settings"}`));
  header.append(headRight);
  root.append(header);

  // ── Slot grid
  const grid = mk("div",{style:{
    display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"10px",marginBottom:"18px"
  }});
  SLOTS.forEach(slot => grid.append(renderCard(slot)));
  root.append(grid);

  // ── Action buttons
  const actions = mk("div",{style:{display:"flex",gap:"8px",marginBottom:"14px"}});

  const btnGen = mk("button",{
    class:"btn-main",
    style:{flex:"2",height:"44px",borderRadius:"10px",border:"none",
      background:t.accent,color:"#fff",fontSize:"14px",fontWeight:"600",letterSpacing:"-0.1px"},
    onClick:generateAll
  },state.lang==="ru"?"⚡ ГЕНЕРИРОВАТЬ ВСЁ":"⚡ GENERATE ALL");
  actions.append(btnGen);

  const btnClear = mk("button",{
    style:{flex:"1",height:"44px",borderRadius:"10px",
      border:`1px solid ${t.border}`,background:"transparent",
      color:t.textSub,fontSize:"13px"},
    onClick:clearAll
  },state.lang==="ru"?"✕ Очистить":"✕ Clear");
  actions.append(btnClear);
  root.append(actions);

  // ── Prompt bar
  const promptWrap = mk("div",{
    id:"prompt-wrap",
    style:{display:"none",background:t.surface,border:`1px solid ${t.border}`,
      borderRadius:"12px",padding:"14px 18px",gap:"12px",alignItems:"flex-start"}
  });

  const promptBody = mk("div",{style:{flex:"1",minWidth:"0"}});
  promptBody.append(mk("div",{style:{
    fontSize:"10px",fontWeight:"600",color:t.textMuted,
    letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"6px"
  }},state.lang==="ru"?"Промпт":"Prompt"));
  promptBody.append(mk("p",{
    id:"prompt-text",class:"prompt-text",
    style:{margin:"0",fontSize:"12px",color:t.textSub,lineHeight:"1.6",wordBreak:"break-word"}
  },""));
  promptWrap.append(promptBody);

  const btnCopy = mk("button",{
    id:"btn-copy",class:"btn-copy",
    style:{flexShrink:"0",height:"32px",padding:"0 14px",borderRadius:"8px",
      border:`1px solid ${t.border}`,background:"transparent",
      color:t.textSub,fontSize:"11px",fontWeight:"500",whiteSpace:"nowrap"},
    onClick:() => {
      const txt = buildPrompt();
      if (!txt) return;
      navigator.clipboard.writeText(txt).then(() => {
        const btn = $("btn-copy");
        if (!btn) return;
        btn.textContent = state.lang==="ru"?"Скопировано ✓":"Copied ✓";
        btn.style.borderColor = t.accent;
        btn.style.color = t.accentText;
        btn.style.background = t.accentLight;
        setTimeout(() => {
          btn.textContent = state.lang==="ru"?"Копировать":"Copy";
          btn.style.borderColor = t.border;
          btn.style.color = t.textSub;
          btn.style.background = "transparent";
        }, 2000);
      });
    }
  },state.lang==="ru"?"Копировать":"Copy");
  promptWrap.append(btnCopy);
  root.append(promptWrap);

  // restore prompt if there are selections
  updatePrompt();
}

// ─── Boot ─────────────────────────────────────────────────────────────────

renderApp();
</script>
</body>
</html>
